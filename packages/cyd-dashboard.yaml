                c = static_cast<char>(c - 'A' + 'a');
              }
            }

            const bool is_running =
                s.find("running") != std::string::npos ||
                s.find("print") != std::string::npos ||
                s.find("imprim") != std::string::npos ||
                s.find("working") != std::string::npos ||
                s.find("process") != std::string::npos;

