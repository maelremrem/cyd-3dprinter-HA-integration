sensor:
  - platform: homeassistant
    id: printer_progress
    entity_id: ${printer_progress_entity}
    internal: true

  - platform: homeassistant
    id: printer_nozzle_temp
    entity_id: ${printer_nozzle_entity}
    internal: true

  - platform: homeassistant
    id: printer_bed_temp
    entity_id: ${printer_bed_entity}
    internal: true

  - platform: homeassistant
    id: printer_time_left
    entity_id: ${printer_time_entity}
    internal: true

  - platform: homeassistant
    id: printer_current_layer
    entity_id: ${printer_layer_entity}
    internal: true

  - platform: homeassistant
    id: printer_total_layers
    entity_id: ${printer_total_layer_entity}
    internal: true

  - platform: wifi_signal
    id: wifi_signal_db
    name: "${friendly_name} WiFi Signal"
    entity_category: diagnostic
    disabled_by_default: false
    update_interval: 10s

  - platform: uptime
    id: device_uptime_s
    name: "${friendly_name} Uptime"
    entity_category: diagnostic
    disabled_by_default: false
    update_interval: 60s

text_sensor:
  - platform: homeassistant
    id: ha_clock_text
    entity_id: ${ha_clock_entity}
    internal: true

  - platform: homeassistant
    id: printer_status
    entity_id: ${printer_state_entity}
    internal: true

  - platform: homeassistant
    id: printer_start_time
    entity_id: ${printer_start_time_entity}
    internal: true

  - platform: homeassistant
    id: printer_end_time
    entity_id: ${printer_end_time_entity}
    internal: true

  - platform: homeassistant
    id: printer_time_left_unit
    entity_id: ${printer_time_entity}
    attribute: unit_of_measurement
    internal: true

  - platform: homeassistant
    id: printer_power_state
    entity_id: ${printer_power_entity}
    internal: true

  - platform: homeassistant
    id: printer_power_unit
    entity_id: ${printer_power_entity}
    attribute: unit_of_measurement
    internal: true

  - platform: template
    id: printer_time_left_formatted
    internal: true

  - platform: template
    id: touch_last_position
    name: "${friendly_name} Last Touch"
    icon: mdi:gesture-tap
    entity_category: diagnostic
    disabled_by_default: false
    update_interval: never
    lambda: |-
      return {};

  - platform: wifi_info
    ip_address:
      id: device_ip_address
      name: "${friendly_name} IP Address"
      entity_category: diagnostic
      disabled_by_default: false
    ssid:
      name: "${friendly_name} WiFi SSID"
      entity_category: diagnostic
      disabled_by_default: false
    bssid:
      name: "${friendly_name} WiFi BSSID"
      entity_category: diagnostic
      disabled_by_default: false
    mac_address:
      name: "${friendly_name} WiFi MAC"
      entity_category: diagnostic
      disabled_by_default: false
    dns_address:
      name: "${friendly_name} DNS"
      entity_category: diagnostic
      disabled_by_default: false
    power_save_mode:
      name: "${friendly_name} WiFi Power Save"
      entity_category: diagnostic
      disabled_by_default: false

  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
    disabled_by_default: false
    hide_timestamp: true
    hide_hash: true

binary_sensor:
  - platform: homeassistant
    id: quick_action_entity_state
    entity_id: ${quick_action_entity}
    internal: true
    on_state:
      - script.execute: refresh_ui

  - platform: gpio
    name: "${friendly_name} Touch IRQ"
    pin:
      number: ${pin_touch_irq}
      mode:
        input: true
      inverted: true
    entity_category: diagnostic
    disabled_by_default: false

  - platform: touchscreen
    name: "${friendly_name} Touch Activity"
    touchscreen_id: cyd_touch
    x_min: 0
    x_max: ${display_w}
    y_min: 0
    y_max: ${display_h}
    entity_category: diagnostic
    disabled_by_default: false

  - platform: status
    name: "${friendly_name} Status"
    entity_category: diagnostic
    disabled_by_default: false

switch:
  - platform: template
    id: dev_mode
    name: "${friendly_name} Dev Mode"
    icon: mdi:code-braces
    entity_category: diagnostic
    disabled_by_default: false
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - logger.set_level: VERBOSE
      - lambda: |-
          id(last_user_activity_ms) = millis();
          if (id(is_sleeping)) {
            id(is_sleeping) = false;
          }
      - script.execute: apply_backlight_from_state
      - script.execute: refresh_ui
    turn_off_action:
      - logger.set_level: INFO
      - lambda: |-
          id(last_user_activity_ms) = millis();

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: diagnostic
    disabled_by_default: false

select:
  - platform: template
    id: cfg_theme
    name: "${friendly_name} Theme"
    icon: mdi:palette
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "Tactical"
      - "Monitor"
      - "Orbit"
      - "Blueprint"
      - "Brutal"
      - "Apple"
      - "Modern Grid"
      - "Skeuomorphic"
    initial_option: "Tactical"
    set_action:
      - lambda: |-
          id(cfg_theme).publish_state(x);
      - script.execute: apply_theme
      - script.execute: apply_palette
      - script.execute: refresh_ui

  - platform: template
    id: cfg_palette
    name: "${friendly_name} Palette"
    icon: mdi:palette-swatch
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "Tactical"
      - "Monitor"
      - "Orbit"
      - "Blueprint"
      - "Brutal"
      - "Apple"
      - "Modern Grid"
      - "Skeuomorphic"
    initial_option: "Tactical"
    set_action:
      - lambda: |-
          id(cfg_palette).publish_state(x);
      - script.execute: apply_palette
      - script.execute: refresh_ui

number:
  - platform: template
    id: cfg_sleep_timeout_s
    name: "${friendly_name} Sleep Timeout"
    icon: mdi:timer-outline
    unit_of_measurement: s
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 10
    max_value: 3600
    step: 10
    mode: box

  - platform: template
    id: cfg_backlight_min_pct
    name: "${friendly_name} Backlight Min"
    icon: mdi:brightness-4
    unit_of_measurement: "%"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 20
    min_value: 1
    max_value: 100
    step: 1
    mode: slider
    set_action:
      - lambda: |-
          if (x > id(cfg_backlight_max_pct).state) {
            id(cfg_backlight_max_pct).publish_state(x);
          }
      - script.execute: apply_backlight_from_state

  - platform: template
    id: cfg_backlight_max_pct
    name: "${friendly_name} Backlight Max"
    icon: mdi:brightness-7
    unit_of_measurement: "%"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 1
    max_value: 100
    step: 1
    mode: slider
    set_action:
      - lambda: |-
          if (x < id(cfg_backlight_min_pct).state) {
            id(cfg_backlight_min_pct).publish_state(x);
          }
      - script.execute: apply_backlight_from_state

  - platform: template
    id: cfg_backlight_sleep_pct
    name: "${friendly_name} Backlight Sleep"
    icon: mdi:weather-night
    unit_of_measurement: "%"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 8
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    set_action:
      - script.execute: apply_backlight_from_state

script:
  - id: apply_backlight_from_state
    mode: restart
    then:
      - light.turn_on:
          id: backlight
          brightness: !lambda |-
            float min_b = id(cfg_backlight_min_pct).state / 100.0f;
            float max_b = id(cfg_backlight_max_pct).state / 100.0f;
            float sleep_b = id(cfg_backlight_sleep_pct).state / 100.0f;

            if (isnan(min_b)) min_b = 0.20f;
            if (isnan(max_b)) max_b = 1.00f;
            if (isnan(sleep_b)) sleep_b = 0.08f;

            if (min_b < 0.01f) min_b = 0.01f;
            if (min_b > 1.00f) min_b = 1.00f;

            if (max_b < min_b) max_b = min_b;
            if (max_b > 1.00f) max_b = 1.00f;

            if (sleep_b < 0.00f) sleep_b = 0.00f;
            if (sleep_b > 1.00f) sleep_b = 1.00f;

            return id(is_sleeping) ? sleep_b : max_b;

  - id: show_quick_panel
    mode: restart
    then:
      - lambda: |-
          id(quick_panel_visible) = true;
      - script.execute: refresh_ui
      - lvgl.page.show:
          id: page_quick_panel
          animation: MOVE_TOP
          time: 220ms

  - id: hide_quick_panel
    mode: restart
    then:
      - lambda: |-
          id(quick_panel_visible) = false;
      - script.execute: apply_theme
      - script.execute: refresh_ui

  - id: apply_theme
    mode: restart
    then:
      - lambda: |-
          id(quick_panel_visible) = false;
