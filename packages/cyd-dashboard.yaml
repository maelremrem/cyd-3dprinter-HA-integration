              if (colon >= 2 && is_digit(s[colon - 2]) && is_digit(s[colon - 1])) {
                s = s.substr(colon - 2, 5);
              } else if (colon >= 1 && is_digit(s[colon - 1])) {
                s = std::string("0") + s.substr(colon - 1, 4);
              } else {
                s = "--";
              }
            } else {
              s = "--";
            }
            return std::string("S ") + s;

