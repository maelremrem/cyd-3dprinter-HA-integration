esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  min_version: 2025.2.0
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
  on_boot:
    priority: -10
    then:
      - lambda: |-
          id(last_user_activity_ms) = millis();
          id(is_sleeping) = false;
      - script.execute: apply_backlight_from_state
      # ── Step 1: System init ──────────────────────────
      - lvgl.label.update:
          id: loading_step1_icon
          text_color: 0x35D08A
      - lvgl.label.update:
          id: loading_step1_status
          text: "OK"
          text_color: 0x35D08A
      - lvgl.bar.update:
          id: loading_progress_bar
          value: 1
      # ── Step 2: WiFi ─────────────────────────────────
      - lvgl.label.update:
          id: loading_step2_icon
          text_color: 0xFFB74D
      - lvgl.label.update:
          id: loading_step2_status
          text: "..."
          text_color: 0xFFB74D
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - if:
          condition:
            wifi.connected:
          then:
            - lvgl.label.update:
                id: loading_step2_icon
                text_color: 0x35D08A
            - lvgl.label.update:
                id: loading_step2_status
                text: !lambda |-
                  auto ips = id(wifi_main).get_ip_addresses();
                  if (ips.empty()) {
                    return std::string("N/A");
                  }
                  char buf[esphome::network::IP_ADDRESS_BUFFER_SIZE];
                  ips[0].str_to(buf);
                  return std::string(buf);
                text_color: 0x35D08A
          else:
            - lvgl.label.update:
                id: loading_step2_icon
                text_color: 0xFF7043
            - lvgl.label.update:
                id: loading_step2_status
                text: "ERR"
                text_color: 0xFF7043
      - lvgl.bar.update:
          id: loading_progress_bar
          value: 2
      # ── Step 3: Home Assistant ───────────────────────
      - lvgl.label.update:
          id: loading_step3_icon
          text_color: 0xFFB74D
      - lvgl.label.update:
          id: loading_step3_status
          text: "..."
          text_color: 0xFFB74D
      - wait_until:
          condition:
            api.connected:
          timeout: 20s
      - if:
          condition:
            api.connected:
          then:
            - lvgl.label.update:
                id: loading_step3_icon
                text_color: 0x35D08A
            - lvgl.label.update:
                id: loading_step3_status
                text: "OK"
                text_color: 0x35D08A
          else:
            - lvgl.label.update:
                id: loading_step3_icon
                text_color: 0xFF7043
            - lvgl.label.update:
                id: loading_step3_status
                text: "ERR"
                text_color: 0xFF7043
      - lvgl.bar.update:
          id: loading_progress_bar
          value: 3
      # ── Step 4: UI ───────────────────────────────────
      - lvgl.label.update:
          id: loading_step4_icon
          text_color: 0xFFB74D
      - lvgl.label.update:
          id: loading_step4_status
          text: "..."
          text_color: 0xFFB74D
      - lambda: |-
          static const char* themes[] = {
            "Tactical", "Monitor", "Orbit", "Blueprint",
            "Brutal", "Apple", "Modern Grid", "Skeuomorphic"
          };
          static const char* palettes[] = {
            "Tactical", "Monitor", "Orbit", "Blueprint",
            "Brutal", "Apple", "Modern Grid", "Skeuomorphic"
          };
          int tidx = id(saved_theme_idx);
          if (tidx >= 0 && tidx < 8) {
            id(cfg_theme).publish_state(std::string(themes[tidx]));
          }
          int pidx = id(saved_palette_idx);
          if (pidx >= 0 && pidx < 8) {
            id(cfg_palette).publish_state(std::string(palettes[pidx]));
          }
      - script.execute: apply_theme
      - delay: 100ms
      - script.execute: apply_palette
      - delay: 100ms
      - lvgl.label.update:
          id: loading_step4_icon
          text_color: 0x35D08A
      - lvgl.label.update:
          id: loading_step4_status
          text: "OK"
          text_color: 0x35D08A
      - lvgl.bar.update:
          id: loading_progress_bar
          value: 4
      - delay: 800ms
      - lvgl.widget.hide: loading_overlay

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true


logger:
    level: VERBOSE
    initial_level: INFO

preferences:
  flash_write_interval: 10s

api:
  id: api_server
  encryption:
    key: ${ha_api_key}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  id: wifi_main
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "CYD-${short_name}-Fallback"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

globals:
  - id: last_user_activity_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: is_sleeping
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: quick_panel_visible
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: swipe_gesture_consumed
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: palette_bg_color
    type: uint32_t
    restore_value: no
    initial_value: '0x5A79B7'

  - id: palette_card_color
    type: uint32_t
    restore_value: no
    initial_value: '0x121A2B'

  - id: palette_card_soft_color
    type: uint32_t
    restore_value: no
    initial_value: '0x1A2640'

  - id: palette_text_color
    type: uint32_t
    restore_value: no
    initial_value: '0xF7FBFF'

  - id: palette_muted_color
    type: uint32_t
    restore_value: no
    initial_value: '0xD3E1FA'

  - id: palette_accent_color
    type: uint32_t
    restore_value: no
    initial_value: '0x7DFFD8'

  - id: palette_hot_color
    type: uint32_t
    restore_value: no
    initial_value: '0xFFAE89'

  - id: palette_cold_color
    type: uint32_t
    restore_value: no
    initial_value: '0xEAFBFF'

  - id: palette_line_color
    type: uint32_t
    restore_value: no
    initial_value: '0x8DA3C7'

  - id: palette_success_color
    type: uint32_t
    restore_value: no
    initial_value: '0x3DDC97'

  - id: palette_on_accent_color
    type: uint32_t
    restore_value: no
    initial_value: '0x143828'

  - id: toast_message
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: saved_theme_idx
    type: int
    restore_value: yes
    initial_value: '0'

  - id: saved_palette_idx
    type: int
    restore_value: yes
    initial_value: '0'

spi:
  - id: lcd
    clk_pin: ${pin_spi_clk}
    mosi_pin: ${pin_spi_mosi}
    miso_pin: ${pin_spi_miso}

  - id: touch
    clk_pin: ${pin_touch_clk}
    mosi_pin: ${pin_touch_mosi}
    miso_pin: ${pin_touch_miso}

output:
  - platform: ledc
    id: backlight_pwm
    pin: ${pin_tft_bl}
    frequency: 1000Hz

  - platform: ledc
    id: output_red
    pin: GPIO4
    inverted: true
  - platform: ledc
    id: output_green
    pin: GPIO16
    inverted: true
  - platform: ledc
    id: output_blue
    pin: GPIO17
    inverted: true

light:
  - platform: monochromatic
    id: backlight
    name: "${friendly_name} Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

  - platform: rgb
    name: LED
    red: output_red
    id: led
    green: output_green
    blue: output_blue
    restore_mode: ALWAYS_OFF

display:
  - platform: mipi_spi
    id: tft
    spi_id: lcd
    model: ILI9341
    cs_pin: ${pin_tft_cs}
    dc_pin: ${pin_tft_dc}
    invert_colors: false
    color_order: bgr
    byte_order: big_endian
    data_rate: 20MHz
    auto_clear_enabled: false
    color_depth: 16
    transform:
      swap_xy: ${display_swap_xy}
      mirror_x: ${display_mirror_x}
      mirror_y: ${display_mirror_y}
    dimensions:
      width: ${display_w}
      height: ${display_h}
    update_interval: never

touchscreen:
  - platform: xpt2046
    id: cyd_touch
    display: tft
    spi_id: touch
    cs_pin: ${pin_touch_cs}
    # Poll the controller continuously because some CYD IRQ lines only report
    # the initial press and miss drag updates needed for swipe gestures.
    update_interval: 30ms
    threshold: 400
    calibration:
      x_min: ${touch_cal_x_min}
      x_max: ${touch_cal_x_max}
      y_min: ${touch_cal_y_min}
      y_max: ${touch_cal_y_max}
    transform:
      swap_xy: ${touch_swap_xy}
      mirror_x: ${touch_mirror_x}
      mirror_y: ${touch_mirror_y}
    on_touch:
      - lambda: |-
          id(last_user_activity_ms) = millis();
          id(is_sleeping) = false;

          char touch_position[48];
          snprintf(touch_position, sizeof(touch_position), "%d,%d raw:%d,%d", touch.x, touch.y, touch.x_raw, touch.y_raw);
          id(touch_last_position).publish_state(touch_position);
          ESP_LOGW("touch", "touch callback start x=%d y=%d raw_x=%d raw_y=%d", touch.x, touch.y, touch.x_raw, touch.y_raw);
      - script.execute: apply_backlight_from_state
    on_update:
      - lambda: |-
          id(last_user_activity_ms) = millis();
          if (id(is_sleeping)) {
            id(is_sleeping) = false;
          }

          const int open_zone_min_y = ${display_h} / 2;
          const int close_zone_max_y = 54;
          const int min_swipe_distance = 20;
          const int max_horizontal_drift = 96;

          for (auto touch : touches) {
            if (touch.state == 0 || touch.state >= 4) {
              continue;
            }

            if (touch.state <= 2) {
              char touch_position[48];
              snprintf(touch_position, sizeof(touch_position), "%d,%d raw:%d,%d", touch.x, touch.y, touch.x_raw, touch.y_raw);
              id(touch_last_position).publish_state(touch_position);

              static uint32_t last_touch_log_ms = 0;
              const uint32_t now = millis();
              if (touch.state == 1 || now - last_touch_log_ms >= 150) {
                last_touch_log_ms = now;
                ESP_LOGW("touch", "touch callback update state=%d x=%d y=%d raw_x=%d raw_y=%d", touch.state, touch.x, touch.y, touch.x_raw, touch.y_raw);
              }
            }

            int raw_delta_x = touch.x - touch.x_org;
            int delta_x = raw_delta_x < 0 ? -raw_delta_x : raw_delta_x;

            int delta_y = touch.y - touch.y_org;
            int abs_delta_y = delta_y < 0 ? -delta_y : delta_y;

            if (!id(quick_panel_visible)) {
              if (!id(swipe_gesture_consumed) && touch.y_org >= open_zone_min_y && delta_y <= -min_swipe_distance && delta_x <= max_horizontal_drift) {
                ESP_LOGI("touch", "quick panel open swipe y_org=%d y=%d dx=%d", touch.y_org, touch.y, delta_x);
                id(swipe_gesture_consumed) = true;
                id(show_quick_panel).execute();
                break;
              }
              if (!id(swipe_gesture_consumed) && delta_x >= 60 && abs_delta_y <= 60) {
                id(swipe_gesture_consumed) = true;
                if (raw_delta_x < 0) {
                  ESP_LOGI("touch", "swipe right-to-left: next theme dx=%d", raw_delta_x);
                  id(next_theme).execute();
                } else {
                  ESP_LOGI("touch", "swipe left-to-right: next palette dx=%d", raw_delta_x);
                  id(next_palette).execute();
                }
                break;
              }
            } else {
              if (!id(swipe_gesture_consumed) && touch.y_org <= close_zone_max_y && delta_y >= min_swipe_distance && delta_x <= max_horizontal_drift) {
                ESP_LOGI("touch", "quick panel close swipe y_org=%d y=%d dx=%d", touch.y_org, touch.y, delta_x);
                id(swipe_gesture_consumed) = true;
                id(hide_quick_panel).execute();
                break;
              }
            }
          }
    on_release:
      - lambda: |-
          id(swipe_gesture_consumed) = false;

