              snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
              return std::string(buf);
            }

            std::string ha_clock = id(ha_clock_text).state;
            if (!ha_clock.empty() && ha_clock != "unknown" && ha_clock != "unavailable") {
              if (ha_clock.size() >= 5 && ha_clock[2] == ':') {
                return ha_clock.substr(0, 5);
              }
              return ha_clock;
            }

            return std::string("--:--");

      - lvgl.label.update:
          id: status_value
          text: !lambda |-
            std::string s = id(printer_status).state;
            if (s.empty() || s == "unknown" || s == "unavailable") {
              return std::string("OFFLINE");
            }
            for (char &c : s) {
              if (c >= 'a' && c <= 'z') {
                c = static_cast<char>(c - 'a' + 'A');
              }
            }
            return s;

      - lvgl.led.update:
          id: tactical_wifi_led
          color: !lambda |-
            if (!id(wifi_main).is_connected()) {
              return lv_color_hex(0xFF6B6B);
            }

            const float rssi = id(wifi_signal_db).state;
            if (isnan(rssi)) {
              return lv_color_hex(0xFF6B6B);
            }

            if (rssi >= -60) {
              return lv_color_hex(0x74F0A4);
            }
            if (rssi >= -72) {
              return lv_color_hex(0xFFD27D);
            }
            return lv_color_hex(0xFF9A6B);

