  - id: show_toast
    mode: restart
    then:
      - lvgl.label.update:
          id: toast_label
          text: !lambda |-
            return id(toast_message);
      - lvgl.widget.show: toast_box
      - delay: 2000ms
      - lvgl.widget.hide: toast_box

  - id: next_theme
    mode: single
    then:
      - lambda: |-
          static const char* themes[] = {
            "Tactical", "Monitor", "Orbit", "Blueprint",
            "Brutal", "Apple", "Modern Grid", "Skeuomorphic"
          };
          const int count = 8;
          const std::string cur = id(cfg_theme).current_option();
          int idx = 0;
          for (int i = 0; i < count; i++) {
            if (cur == themes[i]) { idx = i; break; }
          }
          idx = (idx + 1) % count;
          id(saved_theme_idx) = idx;
          id(toast_message) = std::string("Theme: ") + themes[idx];
          auto call = id(cfg_theme).make_call();
          call.set_option(std::string(themes[idx]));
          call.perform();
      - script.execute: apply_theme
      - script.execute: apply_palette
      - script.execute: refresh_ui
      - script.execute: show_toast

  - id: next_palette
    mode: single
    then:
      - lambda: |-
          static const char* palettes[] = {
            "Tactical", "Monitor", "Orbit", "Blueprint",
            "Brutal", "Apple", "Modern Grid", "Skeuomorphic"
          };
          const int count = 8;
          const std::string cur = id(cfg_palette).current_option();
          int idx = 0;
          for (int i = 0; i < count; i++) {
            if (cur == palettes[i]) { idx = i; break; }
          }
          idx = (idx + 1) % count;
          id(saved_palette_idx) = idx;
          id(toast_message) = std::string("Palette: ") + palettes[idx];
          auto call = id(cfg_palette).make_call();
          call.set_option(std::string(palettes[idx]));
          call.perform();
      - script.execute: apply_palette
      - script.execute: refresh_ui
      - script.execute: show_toast

interval:
  - interval: 1s
    then:
      - script.execute: refresh_ui

  - interval: 150ms
    then:
      - lambda: |-
          static bool was_touching = false;
          static int last_logged_x = -1;
          static int last_logged_y = -1;

          // Use get_touches() instead of get_touch() to avoid UB on empty map
          auto all_touches = id(cyd_touch)->get_touches();
          bool currently_touching = false;
          int point_x = -1, point_y = -1, point_x_raw = -1, point_y_raw = -1;
          for (const auto &tp : all_touches) {
            if (tp.state == 1 || tp.state == 2) {  // STATE_PRESSED or STATE_UPDATED
              currently_touching = true;
              point_x = tp.x;
              point_y = tp.y;
              point_x_raw = tp.x_raw;
              point_y_raw = tp.y_raw;
              break;
            }
          }

          if (currently_touching) {
            char touch_position[48];
            snprintf(touch_position, sizeof(touch_position), "%d,%d raw:%d,%d", point_x, point_y, point_x_raw, point_y_raw);
            id(touch_last_position).publish_state(touch_position);

            if (!was_touching || point_x != last_logged_x || point_y != last_logged_y) {
              was_touching = true;
              last_logged_x = point_x;
              last_logged_y = point_y;
              ESP_LOGW("touch", "touch poll x=%d y=%d raw_x=%d raw_y=%d", point_x, point_y, point_x_raw, point_y_raw);
            }
          } else if (was_touching) {
            was_touching = false;
            last_logged_x = -1;
            last_logged_y = -1;
            ESP_LOGW("touch", "touch poll release");
          }

  - interval: 1s
    then:
      - lambda: |-
          const uint32_t now_ms = millis();

          if (id(dev_mode).state) {
            id(last_user_activity_ms) = now_ms;
            if (id(is_sleeping)) {
              id(is_sleeping) = false;
              id(apply_backlight_from_state).execute();
              id(refresh_ui).execute();
            }
            return;
          }

          std::string state = id(printer_status).state;
          for (char &c : state) {
            if (c >= 'A' && c <= 'Z') {
              c = static_cast<char>(c - 'A' + 'a');
            }
          }

          const bool status_printing =
              state.find("print") != std::string::npos ||
              state.find("imprim") != std::string::npos ||
              state.find("running") != std::string::npos ||
              state.find("working") != std::string::npos ||
              state.find("process") != std::string::npos;

          const bool progress_printing =
              !isnan(id(printer_progress).state) &&
              id(printer_progress).state > 0.0f &&
              id(printer_progress).state < 100.0f;

          const bool time_left_printing =
              !isnan(id(printer_time_left).state) &&
              id(printer_time_left).state > 0.0f;

          const bool print_in_progress = status_printing || (progress_printing && time_left_printing);

          if (print_in_progress) {
            id(last_user_activity_ms) = now_ms;
            if (id(is_sleeping)) {
              id(is_sleeping) = false;
              id(apply_backlight_from_state).execute();
              id(refresh_ui).execute();
            }
            return;
          }

          float timeout_s = id(cfg_sleep_timeout_s).state;
          if (isnan(timeout_s) || timeout_s <= 0) {
            return;
          }

          const uint32_t timeout_ms = static_cast<uint32_t>(timeout_s * 1000.0f);
          const uint32_t idle_ms = now_ms - id(last_user_activity_ms);

          if (!id(is_sleeping) && idle_ms >= timeout_ms) {
            id(is_sleeping) = true;
            id(apply_backlight_from_state).execute();
            id(refresh_ui).execute();
          }

